

services:
  - type: web
    name: wallet-api
    runtime: node
    region: frankfurt  # change to: ohio | oregon | singapore as needed

    # ── Build ───────────────────────────────────────────────────
    # npm install installs ALL deps (including typescript in dependencies)
    # then tsc compiles to dist/
    buildCommand: npm run build

    # ── Start ───────────────────────────────────────────────────
    # Runs the compiled JS — no tsx needed at runtime
    startCommand: node dist/server/index.js

    # ── Health check ────────────────────────────────────────────
    healthCheckPath: /

    # ── Environment Variables ───────────────────────────────────
    # Set SECRET values in the Render dashboard, not here.
    # Only non-secret defaults and references go here.
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # ── Database ──────────────────────────────────────────────
      # If you link a Render Postgres DB, DATABASE_URL is auto-injected.
      # Otherwise, set it manually in the Dashboard.
      - key: DATABASE_URL
        sync: false

      # Fallback individual credentials (only needed if DATABASE_URL is not set)
      - key: INTERNAL_DATABASE_URL_PROD
        sync: false
      - key: EXTERNAL_DATABASE_URL_PROD
        sync: false
      - key: PORT_PROD
        sync: false
      - key: DATABASE_PROD
        sync: false
      - key: USERNAME_PROD
        sync: false
      - key: PASSWORD_PROD
        sync: false

      # ── Auth (set in Render dashboard) ──────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_SECRET_PROD
        sync: false

      # ── QStash (set in Render dashboard) ────────────────────
      - key: QSTASH_TOKEN
        sync: false
      - key: QSTASH_CURRENT_SIGNING_KEY
        sync: false
      - key: QSTASH_NEXT_SIGNING_KEY
        sync: false

      # ── App public URL ────────────────────────────────────────
      # Set this to your Render service URL after first deploy:
      # e.g. https://wallet-api.onrender.com
      - key: APP_BASE_URL
        sync: false
